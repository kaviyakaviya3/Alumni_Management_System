<!DOCTYPE html>
<html>
<head>

<title>Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


<style>

body {
    background-color: #f8f9fa;
}

.card {
    transition: 0.3s;
    border-radius: 15px;
}

.card:hover {
    transform: translateY(-8px);
}

.card-body h2 {
    font-size: 35px;
}

.card-body h5 {
    margin-top: 10px;
    font-weight: bold;
}

.dashboard-title {
    margin-top: 30px;
    margin-bottom: 30px;
}

a {
    text-decoration: none;
    color: black;
}

</style>

</head>


<body>


<!-- Navbar -->

<nav class="navbar navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand">
🎓 AlumniConnect Admin
</a>


<a href="/logout" class="btn btn-danger">
🚪 Logout
</a>


</div>

</nav>



<div class="container">


<h2 class="text-center dashboard-title">
Admin Dashboard
</h2>



<div class="row mt-4">



<!-- Students -->

<div class="col-md-3 mb-4">

<a href="/manage_students">

<div class="card text-center shadow">

<div class="card-body">

<h2>👨‍🎓 {{ total_students }}</h2>

<h5>Students</h5>

</div>

</div>

</a>

</div>




<!-- Alumni -->

<div class="col-md-3 mb-4">

<a href="/manage_alumni">

<div class="card text-center shadow">

<div class="card-body">

<h2>🎓 {{ total_alumni }}</h2>

<h5>Alumni</h5>

</div>

</div>

</a>

</div>





<!-- Jobs -->

<div class="col-md-3 mb-4">

<a href="/manage_jobs">

<div class="card text-center shadow">

<div class="card-body">

<h2>💼 {{ total_jobs }}</h2>

<h5>Jobs</h5>

</div>

</div>

</a>

</div>





<!-- Events -->

<div class="col-md-3 mb-4">

<a href="/manage_events">

<div class="card text-center shadow">

<div class="card-body">

<h2>📅 {{ total_events }}</h2>

<h5>Events</h5>

</div>

</div>

</a>

</div>



</div>


</div>


</body>

</html>
