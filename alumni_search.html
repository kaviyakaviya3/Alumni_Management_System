<!DOCTYPE html>
<html>
<head>
<title>Alumni Search</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2>🔍 Alumni Search</h2>

<table class="table table-bordered">

<tr>
<th>Name</th>
<th>Email</th>
<th>Department</th>
<th>Batch</th>
</tr>

{% for a in alumni %}

<tr>
<td>{{a[1]}}</td>
<td>{{a[2]}}</td>
<td>{{a[4]}}</td>
<td>{{a[5]}}</td>
</tr>

{% endfor %}

</table>

</div>

</body>
</html>
